<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="SmartRecycle AI - 智慧垃圾辨識工具，使用 AI 幫助您正確分類回收物">

    <title>SmartRecycle AI | 智慧垃圾辨識</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Favicon (可選) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♻️</text></svg>">
</head>

<body>
    <div class="app-container">
        <!-- ===== Header ===== -->
        <header class="app-header">
            <div class="app-logo">
                <span class="logo-icon">♻️</span>
                <span class="logo-text">SmartRecycle AI</span>
            </div>

            <div class="menu-container">
                <button class="menu-toggle" id="menu-toggle" aria-label="選單">
                    ☰
                </button>

                <div class="menu-dropdown" id="menu-dropdown">
                    <!-- 上傳圖片 -->
                    <button class="menu-item" id="upload-btn">
                        <span class="menu-icon">📷</span>
                        <span>上傳圖片辨識</span>
                    </button>

                    <!-- 語音播報開關 -->
                    <div class="menu-item toggle-item">
                        <div>
                            <span class="menu-icon">🔊</span>
                            <span>語音播報</span>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="voice-toggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>

                    <!-- 關於 -->
                    <a class="menu-item" href="https://github.com" target="_blank" rel="noopener">
                        <span class="menu-icon">ℹ️</span>
                        <span>關於此專案</span>
                    </a>
                </div>
            </div>
        </header>

        <!-- ===== Main Content ===== -->
        <main class="app-main">
            <!-- 狀態顯示 -->
            <div class="status-badge" id="status-badge">
                等待相機啟動...
            </div>

            <!-- 相機區域 -->
            <section class="camera-section">
                <div class="camera-container" id="camera-container">
                    <!-- 即時影像 -->
                    <video id="camera-video" autoplay playsinline muted></video>

                    <!-- 凍結畫面 Canvas -->
                    <canvas id="camera-canvas" class="hidden"></canvas>

                    <!-- 載入遮罩 -->
                    <div class="loading-overlay" id="loading-overlay">
                        <div class="loading-spinner"></div>
                        <span class="loading-text">辨識中...</span>
                    </div>
                </div>

                <!-- 按鈕區 -->
                <div class="btn-container">
                    <button class="btn btn-primary" id="check-btn">
                        <span>🔍</span>
                        <span>檢查辨識</span>
                    </button>

                    <button class="btn btn-secondary hidden" id="retake-btn">
                        <span>📷</span>
                        <span>重新拍攝</span>
                    </button>
                </div>
            </section>

            <!-- 結果區域 -->
            <section class="result-section">
                <div class="result-card" id="result-card">
                    <div class="result-header">
                        <span class="result-icon" id="result-icon">🔄</span>
                        <div class="result-info">
                            <div class="result-name" id="result-name">辨識中</div>
                            <div class="result-confidence" id="result-confidence">--</div>
                        </div>
                    </div>

                    <div class="result-bar-container">
                        <div class="result-bar" id="result-bar"></div>
                    </div>

                    <p class="result-description" id="result-description"></p>

                    <!-- AI 解說區塊 (Phase 3 預留) -->
                    <div class="ai-explanation" id="ai-explanation">
                        <div class="ai-explanation-title">🤖 AI 回收建議</div>
                        <p class="ai-explanation-content" id="ai-explanation-content"></p>
                    </div>
                </div>
            </section>
        </main>

        <!-- ===== AI Chat Bottom Sheet ===== -->
        <div class="ai-chat-sheet" id="ai-chat-sheet">
            <!-- 拖曳把手 + 展開按鈕 -->
            <div class="ai-chat-handle" id="ai-chat-handle">
                <div class="handle-bar"></div>
                <button class="ai-chat-toggle" id="ai-chat-toggle" aria-label="展開 AI 對話">
                    <span class="toggle-icon">🤖</span>
                </button>
            </div>

            <!-- 聊天區域 -->
            <div class="ai-chat-content">
                <!-- 背景警告文字 -->
                <div class="ai-chat-disclaimer">
                    這是個免費的服務，你的文字與圖片可能會被 Google 用來訓練模型。
                </div>

                <!-- 訊息列表 -->
                <div class="ai-chat-messages" id="ai-chat-messages">
                    <!-- 歡迎訊息 -->
                    <div class="chat-message ai-message">
                        <span class="message-avatar">🤖</span>
                        <div class="message-bubble">
                            你好！我是回收小助手。拍攝物品後，可以問我任何回收相關的問題！
                        </div>
                    </div>
                </div>

                <!-- 輸入區 -->
                <div class="ai-chat-input-area">
                    <input type="text" class="ai-chat-input" id="ai-chat-input" placeholder="輸入你的問題..."
                        autocomplete="off">
                    <button class="ai-chat-send" id="ai-chat-send" aria-label="發送">
                        ➤
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== Footer ===== -->
        <footer class="app-footer">
            <p>Made with ♥ | <a href="https://github.com" target="_blank" rel="noopener">GitHub</a></p>
        </footer>

        <!-- 隱藏的上傳 input -->
        <input type="file" id="upload-input" class="hidden-input" accept="image/*">
    </div>

    <!-- ===== Scripts ===== -->
    <!-- TensorFlow.js (latest version for best compatibility) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <!-- Teachable Machine Image Library -->
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <!-- MobileNet (for fallback/demo mode only) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>

    <!-- App Scripts -->
    <script src="config.js"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
